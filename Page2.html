<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Catch Game 🎂</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #b3e5ff, #ffffff);
}

/* HEADER */
h1 {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 10px;
    font-size: 22px;
    color: #1565c0;
}

#hint {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 45px;
    font-size: 14px;
    color: #0d47a1;
}

#score {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 70px;
    font-size: 18px;
    color: #0d47a1;
}

/* BASKET */
.basket {
    position: absolute;
    bottom: 25px;
    width: 90px;
    height: 50px;
    background: #1976d2;
    border-radius: 14px;
    left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}

/* CAKE */
.cake {
    position: absolute;
    font-size: 30px;
    user-select: none;
}

/* WIN SCREEN */
#win {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 26px;
    color: #1565c0;
    display: none;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    background: #1565c0;
    color: white;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🎂 Catch the Cakes 🎂</h1>
<div id="hint">Try to catch 10 cakes dummy </div>
<div id="score">Score: 0 / 10</div>

<div class="basket" id="basket"></div>

<div id="win"></div>

<script>

let basket = document.getElementById("basket");
let scoreText = document.getElementById("score");
let winScreen = document.getElementById("win");

let score = 0;
let speed = 3;

// =======================
// 🔊 SOUND
// =======================
function beep(freq) {
    try {
        let ctx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = ctx.createOscillator();
        osc.frequency.value = freq;
        osc.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.08);
    } catch(e) {}
}

// =======================
// 📳 VIBRATION
// =======================
function vibrate(ms) {
    if (navigator.vibrate) navigator.vibrate(ms);
}

// =======================
// 🎮 SMOOTH CONTROL
// =======================
let targetX = window.innerWidth / 2;
let currentX = window.innerWidth / 2;
let speedBoost = 0;

function animateBasket() {
    currentX += (targetX - currentX) * (0.12 + speedBoost);
    speedBoost *= 0.95;

    let pos = currentX - 45;

    if (pos < 0) pos = 0;
    if (pos > window.innerWidth - 90) pos = window.innerWidth - 90;

    basket.style.left = pos + "px";

    requestAnimationFrame(animateBasket);
}
animateBasket();

// =======================
// 🖱️ + 📱 CONTROLS
// =======================
document.addEventListener("mousemove", e => {
    targetX = e.clientX;
});

document.addEventListener("touchstart", e => {
    targetX = e.touches[0].clientX;
});

document.addEventListener("touchmove", e => {
    let x = e.touches[0].clientX;

    if (Math.abs(x - targetX) > 30) {
        speedBoost = 0.08;
    }

    targetX = x;
    e.preventDefault();
}, { passive: false });

// =======================
// 🎂 CAKE SPAWN
// =======================
function spawnCake() {
    let cake = document.createElement("div");
    cake.classList.add("cake");
    cake.innerHTML = "🎂";
    cake.style.left = Math.random() * (window.innerWidth - 30) + "px";
    cake.style.top = "-50px";
    document.body.appendChild(cake);

    let fall = setInterval(() => {
        let top = parseInt(cake.style.top);
        cake.style.top = top + speed + "px";

        let b = basket.getBoundingClientRect();
        let c = cake.getBoundingClientRect();

        // COLLISION
        if (
            c.bottom >= b.top &&
            c.left < b.right &&
            c.right > b.left
        ) {
            score++;
            scoreText.innerHTML = "Score: " + score + " / 10";

            cake.remove();
            clearInterval(fall);

            beep(600);
            vibrate(20);

            if (score % 3 === 0) speed += 0.5;

            // WIN CONDITION
            if (score === 10) {
                winGame();
            }
        }

        // MISS
        if (top > window.innerHeight) {
            cake.remove();
            clearInterval(fall);
        }
    }, 20);
}

setInterval(spawnCake, 800);

// =======================
// 🎉 WIN EFFECTS
// =======================
function emojiRain() {
    const emojis = ["🎉","🎊","🎂","🥳","💙","✨","🎈","😄"];

    for (let i = 0; i < 80; i++) {
        let e = document.createElement("div");
        e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
        e.style.position = "fixed";
        e.style.left = Math.random() * window.innerWidth + "px";
        e.style.top = "-50px";
        e.style.fontSize = "22px";
        e.style.zIndex = "9999";
        document.body.appendChild(e);

        let fall = setInterval(() => {
            e.style.top = e.offsetTop + 4 + "px";
            if (e.offsetTop > window.innerHeight) {
                e.remove();
                clearInterval(fall);
            }
        }, 20);
    }
}

function confetti() {
    for (let i = 0; i < 60; i++) {
        let c = document.createElement("div");
        c.style.position = "fixed";
        c.style.width = "6px";
        c.style.height = "6px";
        c.style.background = ["#1976d2","#64b5f6","#fff"][Math.floor(Math.random()*3)];
        c.style.left = window.innerWidth/2 + "px";
        c.style.top = window.innerHeight/2 + "px";
        document.body.appendChild(c);

        let x = (Math.random() - 0.5) * 10;
        let y = (Math.random() - 0.5) * 10;

        let move = setInterval(() => {
            c.style.left = c.offsetLeft + x + "px";
            c.style.top = c.offsetTop + y + "px";
            y += 0.2;

            if (c.offsetTop > window.innerHeight) {
                c.remove();
                clearInterval(move);
            }
        }, 20);
    }
}

// =======================
// 🏆 WIN FUNCTION
// =======================
function winGame() {
    winScreen.style.display = "block";
    winScreen.innerHTML = " You are so slow even eggs started buffering.";

    emojiRain();
    confetti();
    vibrate([100,50,100]);
    beep(900);

    setTimeout(() => {
        window.location.href = "page3.html";
    }, 3000);
}

</script>

</body>
</html>
